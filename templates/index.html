<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Citizen Services</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
    margin: 0;
}

.header {
    background: #007bff;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    width: 90%;
    max-width: 500px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 15px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.helper {
    font-size: 12px;
    color: gray;
}

#preview {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 8px;
    display: none;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #28a745, #20c997);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.9;
}

.challenges-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-weight: bold;
    color: #007bff;
    cursor: pointer;
}

.ai-box {
    background: #f1f9ff;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
🌱 Smart Citizen Services
</div>

<div class="container">
<h1>🚀 Report a Civic Issue</h1>

<form action="/submit" method="POST" enctype="multipart/form-data">

<label>Your Name</label>
<input type="text" name="name" id="username" placeholder="Enter your name" required>

<label>Select Issue Type</label>
<select id="issueType" required>
    <option value="">--Select Issue--</option>
    <option>Garbage problem</option>
    <option>Pothole on road</option>
    <option>Water leakage</option>
    <option>Electricity issue</option>
    <option>Traffic congestion</option>
    <option>Noise pollution</option>
    <option>Flooding</option>
    <option>Open manhole</option>
</select>

<label>Describe the Issue</label>
<textarea name="issue" id="issueText" placeholder="Explain the issue clearly..." required></textarea>

<div class="ai-box" id="aiHint">🤖 AI will analyze your issue...</div>

<label>Area / Location</label>
<input type="text" name="location" required>

<label>Nearby Landmark</label>
<input type="text" name="landmark">

<label>Upload Photo</label>
<input type="file" name="photo" accept="image/*" onchange="previewImage(event)" required>
<img id="preview">

<button type="submit">Submit Complaint</button>

</form>

<div class="challenges-link" onclick="goToChallenges()">
🎯 View Challenges & Earn Points
</div>

</div>

<script>
// 📷 Image Preview
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        const img = document.getElementById('preview');
        img.src = reader.result;
        img.style.display = "block";
    }
    reader.readAsDataURL(event.target.files[0]);
}

// 🚀 Combine dropdown + text for AI
document.querySelector("form").addEventListener("submit", function(){
    const type = document.getElementById("issueType").value;
    const desc = document.getElementById("issueText").value;

    document.getElementById("issueText").value = type + " - " + desc;
});

// 🤖 Live AI Hint
document.getElementById("issueText").addEventListener("input", function(){
    let text = this.value.toLowerCase();
    let hint = document.getElementById("aiHint");

    if(text.includes("leak") || text.includes("water")){
        hint.innerHTML = "💧 AI: Water Issue → Medium Priority";
    }
    else if(text.includes("garbage")){
        hint.innerHTML = "🗑 AI: Waste Issue → High Priority";
    }
    else if(text.includes("fire") || text.includes("wire")){
        hint.innerHTML = "🔥 AI: Dangerous Issue → High Priority";
    }
    else if(text.includes("pothole")){
        hint.innerHTML = "🛣 AI: Road Damage → Medium Priority";
    }
    else{
        hint.innerHTML = "🤖 AI will analyze your issue...";
    }
});

// 🎯 Go to challenges with username
function goToChallenges() {
    const name = document.getElementById("username").value;

    if(name === "") {
        alert("Please enter your name first!");
        return;
    }

    window.location.href = "/challenges?user=" + name;
}
</script>

</body>
</html>
